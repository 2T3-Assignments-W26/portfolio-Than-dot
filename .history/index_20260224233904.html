<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- 
    =============================================
    BASIC PAGE METADATA
    =============================================
    - Title appears in browser tab
    - Change this once for the entire site
  -->
    <title>Info Tech Cheat Sheets</title>

    <!-- 
    =============================================
    RESPONSIVE VIEWPORT
    =============================================
    Ensures the site looks good on laptops and tablets.
  -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 
    =============================================
    DOCSIFY THEME
    =============================================
    This is the default Docsify theme.
    
    Other official themes (drop-in replacement):
    - vue
    - dark
    - buble
    - pure
    
    Docs: https://docsify.js.org/#/themes
  -->
    <link
      rel="stylesheet"
      href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css"
    />
  </head>

  <body>
    <!-- 
    =============================================
    DOCSIFY APP ROOT
    =============================================
    Docsify renders all Markdown content inside this div.
    Students should NOT edit this.
  -->
    <div id="app"></div>

    <script>
      /*
      =============================================
      DOCSIFY CONFIGURATION
      =============================================

      IMPORTANT FOR STUDENTS:
      - Students only edit Markdown files (.md)
      - This file should not be modified during the lab

      IMPORTANT FOR INSTRUCTORS:
      - Most site behavior is controlled here
      - Safe place to enable/disable features later
    */
      window.$docsify = {
        // Name displayed in the sidebar
        name: "Info Tech Cheat Sheets",

        // GitHub repo link (optional)
        // Set to the Classroom template repo if desired
        repo: "",

        //Home page
        homepage: "README.md",

        // Load README.md as the homepage
        loadSidebar: true,

        // Sidebar depth (headings shown)
        subMaxLevel: 2,

        // Enable navigation between pages
        auto2top: true,

        /*
        =============================================
        SEARCH (OPTIONAL - DISABLED FOR NOW)
        =============================================

        To enable search later:
        1. Uncomment the search configuration
        2. Uncomment the search plugin script below

        search: {
          placeholder: 'Search',
          noData: 'No results found',
        },
      */

        /*
        =============================================
        THEMES & PLUGINS (FUTURE GROWTH)
        =============================================

        Docsify supports many plugins:
        - Search
        - Copy-to-clipboard for code
        - Pagination
        - Dark mode toggle

        Docs:
        https://docsify.js.org/#/plugins
      */
      };
    </script>
    <script>
      window.$docsify = {
        search: "auto", // default

        search: [
          "/", // => /README.md
          "/guide", // => /guide.md
          "/get-started", // => /get-started.md
          "/zh-cn/", // => /zh-cn/README.md
        ],

        // complete configuration parameters
        search: {
          maxAge: 86400000, // Expiration time, the default one day
          paths: [], // or 'auto'
          placeholder: "Type to search",

          // Localization
          placeholder: {
            "/zh-cn/": "搜索",
            "/": "Type to search",
          },

          noData: "No Results!",

          // Localization
          noData: {
            "/zh-cn/": "找不到结果",
            "/": "No Results",
          },

          // Headline depth, 1 - 6
          depth: 2,

          hideOtherSidebarContent: false, // whether or not to hide other sidebar content

          // To avoid search index collision
          // between multiple websites under the same domain
          namespace: "website-1",

          // Use different indexes for path prefixes (namespaces).
          // NOTE: Only works in 'auto' mode.
          //
          // When initialiazing an index, we look for the first path from the sidebar.
          // If it matches the prefix from the list, we switch to the corresponding index.
          pathNamespaces: ["/zh-cn", "/ru-ru", "/ru-ru/v1"],

          // You can provide a regexp to match prefixes. In this case,
          // the matching substring will be used to identify the index
          pathNamespaces: /^(\/(zh-cn|ru-ru))?(\/(v1|v2))?/,
        },
      };
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
    <!-- 
    =============================================
    DOCSIFY CORE SCRIPT
    =============================================
    Loads Docsify from a CDN.
    No local installation required.
  -->
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>

    <!-- 
    =============================================
    OPTIONAL PLUGINS (COMMENTED OUT)
    =============================================

    Enable only if needed later.
    These are safe additions once students are comfortable.

    SEARCH PLUGIN:
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>

    COPY CODE BUTTON:
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  -->
    <script src="https://cdn.jsdelivr.net/gh/rizdaprasetya/docsify-fix-pageload-scroll@master/index.js"></script>
    x

    <!-- 
    =============================================
    HELP & DOCUMENTATION
    =============================================

    Official Docsify documentation:
    https://docsify.js.org

    Markdown reference:
    https://www.markdownguide.org/basic-syntax/
  --></body>
</html>
